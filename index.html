<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RepTracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 24px 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #F44336;
      transition: background 0.3s;
    }

    .dot.connected { background: #4CAF50; }

    .message-box {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      height: 380px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .message {
      font-size: 15px;
      color: #e0e0e0;
      font-family: monospace;
      line-height: 1.5;
    }

    .message.highlight {
      color: #4fc3f7;
      font-weight: bold;
    }

    .message.success {
      color: #81c784;
      font-weight: bold;
    }

    .message.warning {
      color: #ffb74d;
      font-weight: bold;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      background: #16213e;
      color: #ffffff;
      border: 1px solid #0f3460;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
    }

    input::placeholder { color: #888; }

    button {
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-send {
      background: #0f3460;
      color: #ffffff;
    }

    .btn-connect {
      width: 100%;
      background: #e94560;
      color: #ffffff;
      padding: 18px;
      font-size: 18px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .btn-disconnect {
      width: 100%;
      background: #444;
      color: #ffffff;
      padding: 18px;
      font-size: 18px;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .btn-clear {
      width: 100%;
      background: #1f3a5f;
      color: #aaaaaa;
      padding: 12px;
      font-size: 14px;
      border-radius: 10px;
    }

    .rep-counter {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }

    .rep-number {
      font-size: 72px;
      font-weight: 700;
      color: #e94560;
      line-height: 1;
    }

    .rep-label {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>RepTracker</h1>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <!-- Rep Counter -->
  <div class="rep-counter">
    <div class="rep-number" id="repCount">0</div>
    <div class="rep-label">REPS</div>
  </div>

  <!-- Message Box -->
  <div class="message-box" id="messageBox"></div>

  <!-- Weight Input (hidden until connected) -->
  <div class="input-row hidden" id="inputRow">
    <input
      type="text"
      id="weightInput"
      placeholder="Enter weight (lbs)"
    />
    <button class="btn-send" onclick="sendWeight()">Send</button>
  </div>

  <!-- Buttons -->
  <button class="btn-connect" id="connectBtn" onclick="connect()">
    Connect to RepTracker
  </button>

  <button class="btn-clear" onclick="clearMessages()">Clear Messages</button>

<script>
  const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
  const CHAR_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

  let device = null;
  let characteristic = null;
  let repCount = 0;

  function addMessage(text, type = '') {
    const box = document.getElementById('messageBox');
    const msg = document.createElement('div');
    msg.className = 'message ' + type;

    // Auto detect message type for color coding
    if (text.includes('Rep #')) msg.className = 'message highlight';
    else if (text.includes('RECOMMENDATION') || text.includes('keep weight') || text.includes('increase') || text.includes('decrease')) msg.className = 'message success';
    else if (text.includes('fatigue') || text.includes('Too')) msg.className = 'message warning';

    msg.textContent = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;

    // Update rep counter
    const repMatch = text.match(/Rep #(\d+)/);
    if (repMatch) {
      repCount = parseInt(repMatch[1]);
      document.getElementById('repCount').textContent = repCount;
    }

    // Reset counter on new set
    if (text.includes('Weight set to') || text.includes('Keeping weight')) {
      repCount = 0;
      document.getElementById('repCount').textContent = '0';
    }
  }

  function setConnected(isConnected) {
    document.getElementById('statusDot').className = 'dot' + (isConnected ? ' connected' : '');
    document.getElementById('statusText').textContent = isConnected ? 'Connected' : 'Disconnected';
    document.getElementById('connectBtn').className = isConnected ? 'btn-disconnect' : 'btn-connect';
    document.getElementById('connectBtn').textContent = isConnected ? 'Disconnect' : 'Connect to RepTracker';
    document.getElementById('connectBtn').onclick = isConnected ? disconnect : connect;
    document.getElementById('inputRow').className = isConnected ? 'input-row' : 'input-row hidden';
  }

  async function connect() {
    try {
      addMessage('Scanning for RepTracker...');
      device = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'RepTracker' }],
        optionalServices: [SERVICE_UUID]
      });

      addMessage('Found RepTracker! Connecting...');
      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CHAR_UUID);

      await characteristic.startNotifications();
      characteristic.addEventListener('characteristicvaluechanged', handleData);

      device.addEventListener('gattserverdisconnected', () => {
        addMessage('Disconnected from RepTracker');
        setConnected(false);
      });

      setConnected(true);
      addMessage('Connected to RepTracker!');

    } catch (err) {
      addMessage('Error: ' + err.message);
    }
  }

  function handleData(event) {
    const value = event.target.value;
    const text = new TextDecoder().decode(value);
    addMessage(text.trim());
  }

  async function sendWeight() {
    const input = document.getElementById('weightInput');
    const weight = input.value.trim();

    if (!weight) {
      addMessage('Please enter a weight first');
      return;
    }

    if (!characteristic) {
      addMessage('Not connected to RepTracker');
      return;
    }

    try {
      const encoder = new TextEncoder();
      await characteristic.writeValue(encoder.encode(weight + '\n'));
      addMessage('Sent weight: ' + weight + ' lbs');
      input.value = '';
    } catch (err) {
      addMessage('Send error: ' + err.message);
    }
  }

  async function disconnect() {
    if (device && device.gatt.connected) {
      device.gatt.disconnect();
    }
    setConnected(false);
  }

  function clearMessages() {
    document.getElementById('messageBox').innerHTML = '';
    repCount = 0;
    document.getElementById('repCount').textContent = '0';
  }

  // Allow pressing Enter to send weight
  document.getElementById('weightInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendWeight();
  });
</script>

</body>
</html>
